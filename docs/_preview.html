<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Preview Audit</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; max-width: 1400px; margin: 24px auto; padding: 0 24px; color: #1f2328; line-height: 1.5; }
  table { border-collapse: collapse; width: 100%; margin: 16px 0; font-size: 13px; }
  th, td { border: 1px solid #d0d7de; padding: 8px 10px; vertical-align: top; text-align: left; }
  th { background: #f6f8fa; }
  thead th[colspan="2"] { text-align: center; background: #ddf4ff; }
  tbody td[colspan="5"] { background: #f6f8fa; font-size: 14px; }
  code { background: #eff1f3; padding: 1px 5px; border-radius: 4px; font-size: 85%; }
  h1 { border-bottom: 1px solid #d0d7de; padding-bottom: 8px; }
  a { color: #0969da; }
  pre { background: #f6f8fa; padding: 12px; border-radius: 6px; overflow-x: auto; }
</style>
</head>
<body>
<div id="content">Memuat…</div>
<script>
fetch('audit/audit-prioritas-2026-07-04.md')
  .then(r => r.text())
  .then(md => { document.getElementById('content').innerHTML = marked.parse(md); })
  .catch(e => { document.getElementById('content').textContent = 'Gagal memuat: ' + e; });
</script>
</body>
</html>
